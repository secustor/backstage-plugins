name: Renovate

on:
  schedule:
    - cron: '17 * * * *' # Every hour at :17 (off-minute to reduce API congestion)
  workflow_dispatch:

concurrency:
  group: renovate
  cancel-in-progress: false # Queue runs, don't cancel in-flight ones

jobs:
  renovate:
    name: Renovate
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}

      - name: Renovate
        uses: renovatebot/github-action@eb932558ad942cccfd8211cf535f17ff183a9f74 # v46.1.9
        with:
          configurationFile: .github/renovate-global.json
          token: ${{ steps.app-token.outputs.token }}
        env:
          RENOVATE_PLATFORM_COMMIT: 'true' # Sign commits via the GitHub App
          LOG_LEVEL: 'debug'
