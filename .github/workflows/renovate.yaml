name: Renovate

on:
  schedule:
    - cron: '17 * * * *' # Every hour at :17 (off-minute to reduce API congestion)
  workflow_dispatch:

concurrency:
  group: renovate
  cancel-in-progress: false # Queue runs, don't cancel in-flight ones

jobs:
  renovate:
    name: Renovate
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}

      - name: Renovate
        uses: renovatebot/github-action@83ec54fee49ab67d9cd201084c1ff325b4b462e4 # v46.1.10
        with:
          configurationFile: .github/renovate-global.json
          token: ${{ steps.app-token.outputs.token }}
        env:
          RENOVATE_PLATFORM_COMMIT: 'true' # Sign commits via the GitHub App
          LOG_LEVEL: 'debug'
